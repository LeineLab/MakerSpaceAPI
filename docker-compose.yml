services:
  db:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MARIADB_DATABASE: ${DB_NAME:-makerspaceapi}
      MARIADB_USER: ${DB_USER:-makerspace}
      MARIADB_PASSWORD: ${DB_PASSWORD:-makerspace}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  app:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: mysql+pymysql://${DB_USER:-makerspace}:${DB_PASSWORD:-makerspace}@db:3306/${DB_NAME:-makerspaceapi}
    volumes:
      - ./logo.svg:/app/statements/logo.svg
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  db_data:
