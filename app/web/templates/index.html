{% extends "base.html" %}
{% block title %}MakerSpaceAPI{% endblock %}
{% block content %}
<div class="text-center py-16">
  <h1 class="text-3xl font-bold mb-4">{{ _('index.title') }}</h1>
  <p class="text-gray-600 mb-8">{{ _('index.subtitle') }}</p>
  <div class="flex gap-4 justify-center">
    <a href="/products" class="bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700">
      {{ _('index.btn_products') }}
    </a>
    {% if not user %}
    <a href="/auth/login" class="bg-gray-700 text-white px-6 py-2 rounded hover:bg-gray-800">
      {{ _('index.btn_login') }}
    </a>
    {% else %}
    <a href="/dashboard" class="bg-gray-700 text-white px-6 py-2 rounded hover:bg-gray-800">
      {{ _('index.btn_dashboard') }}
    </a>
    {% endif %}
  </div>
</div>
{% endblock %}
