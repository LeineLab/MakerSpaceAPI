{% extends "base.html" %}
{% block title %}MakerSpaceAPI{% endblock %}
{% block content %}
<div class="text-center py-16">
  <h1 class="text-3xl font-bold mb-4">MakerSpace NFC System</h1>
  <p class="text-gray-600 mb-8">Unified API for machines, checkout, ATM and rental station.</p>
  <div class="flex gap-4 justify-center">
    <a href="/products" class="bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700">
      View Products
    </a>
    {% if not user %}
    <a href="/auth/login" class="bg-gray-700 text-white px-6 py-2 rounded hover:bg-gray-800">
      Admin Login
    </a>
    {% else %}
    <a href="/dashboard" class="bg-gray-700 text-white px-6 py-2 rounded hover:bg-gray-800">
      Dashboard
    </a>
    {% endif %}
  </div>
</div>
{% endblock %}
