{% extends "base.html" %}
{% block title %}{{ _('machines.detail_title') }} – MakerSpaceAPI{% endblock %}
{% block content %}

<div x-data="machineDetail({{ slug | tojson }}, {{ user_is_admin | tojson }})" x-cloak>

  <!-- Back link -->
  <div class="mb-4">
    <a href="/machines" class="text-sm text-blue-600 hover:underline">← {{ _('machines.back') }}</a>
  </div>

  <!-- Loading / access error -->
  <div x-show="loading" class="text-gray-400 text-sm">Loading…</div>
  <div x-show="error && !loading" class="bg-red-100 text-red-700 p-4 rounded text-sm" x-text="error"></div>

  <template x-if="machine && !loading">
    <div class="space-y-8">

      <!-- ── Machine info ──────────────────────────────────────────── -->
      <div class="bg-white rounded-lg shadow p-6">
        <div class="flex items-center justify-between mb-4">
          <h1 class="text-2xl font-bold" x-text="machine.name"></h1>
          <span x-show="machine.active"
                class="text-xs bg-green-100 text-green-700 rounded px-2 py-0.5">{{ _('common.active') }}</span>
          <span x-show="!machine.active"
                class="text-xs bg-red-100 text-red-600 rounded px-2 py-0.5">{{ _('common.inactive') }}</span>
        </div>
        <dl class="grid grid-cols-2 gap-x-6 gap-y-2 text-sm mb-4">
          <dt class="text-gray-500">{{ _('common.slug') }}</dt>
          <dd class="font-mono" x-text="machine.slug"></dd>
          <dt class="text-gray-500">{{ _('common.type') }}</dt>
          <dd x-text="machine.machine_type"></dd>
          <dt class="text-gray-500">{{ _('common.created') }}</dt>
          <dd x-text="machine.created_at ? machine.created_at.substring(0,10) : ''"></dd>
        </dl>

        <!-- Admin-only edit form -->
        <template x-if="isAdmin">
          <div>
            <button @click="showEditMachine = !showEditMachine"
                    class="text-xs text-blue-600 hover:underline">
              <span x-text="showEditMachine ? '{{ _('common.cancel') }}' : '{{ _('common.edit') }}'"></span>
            </button>
            <form x-show="showEditMachine" @submit.prevent="saveMachine()" class="mt-3 space-y-3 max-w-sm">
              <div x-show="machineEditError" class="text-red-600 text-xs" x-text="machineEditError"></div>
              <div>
                <label class="block text-xs font-medium text-gray-600 mb-1">{{ _('common.name') }}</label>
                <input type="text" x-model="editForm.name" required
                       class="w-full border rounded px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
              </div>
              <div>
                <label class="block text-xs font-medium text-gray-600 mb-1">{{ _('common.slug') }}</label>
                <input type="text" x-model="editForm.slug" required pattern="[a-z0-9_-]+"
                       class="w-full border rounded px-3 py-1.5 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-blue-400">
              </div>
              <div>
                <label class="block text-xs font-medium text-gray-600 mb-1">{{ _('machines.label_type') }}</label>
                <select x-model="editForm.machine_type"
                        class="w-full border rounded px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
                  <option value="machine">machine</option>
                  <option value="checkout">checkout</option>
                  <option value="bankomat">bankomat</option>
                  <option value="rental_station">rental_station</option>
                </select>
              </div>
              <label class="flex items-center gap-2 text-sm">
                <input type="checkbox" x-model="editForm.active" class="rounded">
                {{ _('common.active') }}
              </label>
              <button type="submit" :disabled="savingMachine"
                      class="px-4 py-1.5 bg-blue-600 text-white text-sm rounded hover:bg-blue-700 disabled:opacity-50">
                <span x-show="!savingMachine">{{ _('common.save') }}</span>
                <span x-show="savingMachine">…</span>
              </button>
            </form>
          </div>
        </template>
      </div>

      <!-- ── Authorizations ────────────────────────────────────────── -->
      <div class="bg-white rounded-lg shadow p-6">
        <h2 class="text-lg font-semibold mb-4">{{ _('machines.section_authorizations') }}</h2>

        <div x-show="authError" class="mb-3 bg-red-100 text-red-700 p-2 rounded text-sm" x-text="authError"></div>

        <!-- Auth table -->
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead class="bg-gray-100 text-gray-600 uppercase text-xs">
              <tr>
                <th class="px-4 py-2 text-left">{{ _('common.name') }}</th>
                <th class="px-4 py-2 text-right">{{ _('machines.auth_login_fee') }}</th>
                <th class="px-4 py-2 text-right">{{ _('machines.auth_per_minute') }}</th>
                <th class="px-4 py-2 text-right">{{ _('machines.auth_interval') }}</th>
                <th class="px-4 py-2 text-left">{{ _('machines.auth_granted_by') }}</th>
                <th class="px-4 py-2 text-right">{{ _('machines.col_actions') }}</th>
              </tr>
            </thead>
            <tbody>
              <template x-if="authorizations.length === 0">
                <tr><td colspan="6" class="px-4 py-6 text-center text-gray-400">{{ _('machines.no_auths') }}</td></tr>
              </template>
              <template x-for="a in authorizations" :key="a.user_id">
                <tr class="border-t">
                  <td class="px-4 py-2 font-medium" x-text="a.user_name || a.user_id"></td>
                  <td class="px-4 py-2 text-right font-mono text-xs">
                    <template x-if="editingAuth !== a.user_id">
                      <span x-text="'€' + Number(a.price_per_login).toFixed(2)"></span>
                    </template>
                    <template x-if="editingAuth === a.user_id">
                      <input type="number" step="0.01" min="0" x-model="authEditForm.price_per_login"
                             class="w-20 border rounded px-1 py-0.5 text-xs">
                    </template>
                  </td>
                  <td class="px-4 py-2 text-right font-mono text-xs">
                    <template x-if="editingAuth !== a.user_id">
                      <span x-text="'€' + Number(a.price_per_minute).toFixed(2)"></span>
                    </template>
                    <template x-if="editingAuth === a.user_id">
                      <input type="number" step="0.01" min="0" x-model="authEditForm.price_per_minute"
                             class="w-20 border rounded px-1 py-0.5 text-xs">
                    </template>
                  </td>
                  <td class="px-4 py-2 text-right font-mono text-xs">
                    <template x-if="editingAuth !== a.user_id">
                      <span x-text="a.booking_interval + ' min'"></span>
                    </template>
                    <template x-if="editingAuth === a.user_id">
                      <input type="number" min="1" x-model="authEditForm.booking_interval"
                             class="w-16 border rounded px-1 py-0.5 text-xs">
                    </template>
                  </td>
                  <td class="px-4 py-2 text-xs text-gray-500" x-text="a.granted_by || '—'"></td>
                  <td class="px-4 py-2 text-right whitespace-nowrap">
                    <template x-if="editingAuth !== a.user_id">
                      <span>
                        <button @click="startEditAuth(a)"
                                class="text-xs text-blue-600 hover:underline mr-2">{{ _('common.edit') }}</button>
                        <button @click="removeAuth(a.user_id)"
                                class="text-xs text-red-500 hover:underline">{{ _('common.remove') }}</button>
                      </span>
                    </template>
                    <template x-if="editingAuth === a.user_id">
                      <span>
                        <button @click="saveAuth(a.user_id)"
                                class="text-xs text-green-600 hover:underline mr-2">{{ _('common.save') }}</button>
                        <button @click="editingAuth = null"
                                class="text-xs text-gray-500 hover:underline">{{ _('common.cancel') }}</button>
                      </span>
                    </template>
                  </td>
                </tr>
              </template>
            </tbody>
          </table>
        </div>

        <!-- Add auth form (always visible) -->
        <div class="mt-6 pt-5 border-t">
          <h3 class="text-sm font-semibold text-gray-700 mb-3">{{ _('machines.btn_add_auth') }}</h3>
          <div x-show="addAuthError" class="mb-2 bg-red-100 text-red-700 p-2 rounded text-xs" x-text="addAuthError"></div>
          <div x-show="authUsers.length === 0" class="text-xs text-gray-400 mb-2">
            {{ _('machines.no_users_available') }}
          </div>
          <form @submit.prevent="addAuth()" class="space-y-3 max-w-sm" x-show="authUsers.length > 0">
            <div>
              <label class="block text-xs font-medium text-gray-600 mb-1">{{ _('machines.select_user') }}</label>
              <select x-model="addAuthForm.nfc_id" required
                      class="w-full border rounded px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
                <option value="">—</option>
                <template x-for="u in authUsers" :key="u.id">
                  <option :value="u.id" x-text="u.name + ' (' + u.id + ')'"></option>
                </template>
              </select>
            </div>
            <div class="grid grid-cols-3 gap-2">
              <div>
                <label class="block text-xs text-gray-600 mb-1">{{ _('machines.auth_login_fee') }} (€)</label>
                <input type="number" step="0.01" min="0" x-model="addAuthForm.price_per_login"
                       class="w-full border rounded px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
              </div>
              <div>
                <label class="block text-xs text-gray-600 mb-1">{{ _('machines.auth_per_minute') }} (€)</label>
                <input type="number" step="0.01" min="0" x-model="addAuthForm.price_per_minute"
                       class="w-full border rounded px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
              </div>
              <div>
                <label class="block text-xs text-gray-600 mb-1">{{ _('machines.auth_interval') }} (min)</label>
                <input type="number" min="1" x-model="addAuthForm.booking_interval"
                       class="w-full border rounded px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
              </div>
            </div>
            <button type="submit" :disabled="addingAuth"
                    class="px-4 py-1.5 bg-blue-600 text-white text-sm rounded hover:bg-blue-700 disabled:opacity-50">
              <span x-show="!addingAuth">{{ _('machines.btn_add_auth') }}</span>
              <span x-show="addingAuth">…</span>
            </button>
          </form>
        </div>
      </div>

      <!-- ── Machine Admins (admin only) ───────────────────────────── -->
      <template x-if="isAdmin">
        <div class="bg-white rounded-lg shadow p-6">
          <h2 class="text-lg font-semibold mb-4">{{ _('machines.section_admins') }}</h2>

          <div x-show="adminError" class="mb-3 bg-red-100 text-red-700 p-2 rounded text-sm" x-text="adminError"></div>

          <div class="overflow-x-auto">
            <table class="w-full text-sm">
              <thead class="bg-gray-100 text-gray-600 uppercase text-xs">
                <tr>
                  <th class="px-4 py-2 text-left">{{ _('common.name') }}</th>
                  <th class="px-4 py-2 text-left">{{ _('machines.admin_oidc_sub') }}</th>
                  <th class="px-4 py-2 text-right">{{ _('machines.col_actions') }}</th>
                </tr>
              </thead>
              <tbody>
                <template x-if="machineAdmins.length === 0">
                  <tr><td colspan="3" class="px-4 py-6 text-center text-gray-400">{{ _('machines.no_admins') }}</td></tr>
                </template>
                <template x-for="a in machineAdmins" :key="a.oidc_sub">
                  <tr class="border-t">
                    <td class="px-4 py-2 font-medium" x-text="a.user_name || '—'"></td>
                    <td class="px-4 py-2 font-mono text-xs text-gray-500" x-text="a.oidc_sub"></td>
                    <td class="px-4 py-2 text-right">
                      <button @click="removeAdmin(a.oidc_sub)"
                              class="text-xs text-red-500 hover:underline">{{ _('common.remove') }}</button>
                    </td>
                  </tr>
                </template>
              </tbody>
            </table>
          </div>

          <!-- Add admin form (always visible) -->
          <div class="mt-6 pt-5 border-t">
            <h3 class="text-sm font-semibold text-gray-700 mb-3">{{ _('machines.btn_add_admin') }}</h3>
            <div x-show="addAdminError" class="mb-2 bg-red-100 text-red-700 p-2 rounded text-xs" x-text="addAdminError"></div>
            <div x-show="usersWithOidc.length === 0" class="text-xs text-gray-400 mb-2">
              {{ _('machines.no_oidc_users') }}
            </div>
            <form @submit.prevent="addAdmin()" class="space-y-3 max-w-sm" x-show="usersWithOidc.length > 0">
              <div>
                <label class="block text-xs font-medium text-gray-600 mb-1">{{ _('machines.select_user') }}</label>
                <select x-model="addAdminForm.oidc_sub" required
                        class="w-full border rounded px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
                  <option value="">—</option>
                  <template x-for="u in usersWithOidc" :key="u.id">
                    <option :value="u.oidc_sub" x-text="(u.name || u.oidc_sub) + ' (' + u.oidc_sub + ')'"></option>
                  </template>
                </select>
              </div>
              <button type="submit" :disabled="addingAdmin"
                      class="px-4 py-1.5 bg-blue-600 text-white text-sm rounded hover:bg-blue-700 disabled:opacity-50">
                <span x-show="!addingAdmin">{{ _('machines.btn_add_admin') }}</span>
                <span x-show="addingAdmin">…</span>
              </button>
            </form>
          </div>
        </div>
      </template>

    </div>
  </template>
</div>

<script>
function machineDetail(slug, isAdmin) {
  return {
    slug: slug,
    isAdmin: isAdmin,
    machine: null,
    authorizations: [],
    machineAdmins: [],
    authUsers: [],   // named users for auth dropdown (from /{slug}/users)
    allUsers: [],    // all users for admin dropdown (from /users, admin-only)
    loading: true,
    error: null,

    // Machine edit
    showEditMachine: false,
    editForm: {},
    machineEditError: null,
    savingMachine: false,

    // Auth management
    authError: null,
    editingAuth: null,
    authEditForm: {},
    addAuthForm: { nfc_id: '', price_per_login: '0.00', price_per_minute: '0.00', booking_interval: 60 },
    addAuthError: null,
    addingAuth: false,

    // Machine admin management
    adminError: null,
    addAdminForm: { oidc_sub: '' },
    addAdminError: null,
    addingAdmin: false,

    get usersWithOidc() {
      return this.allUsers.filter(u => u.oidc_sub);
    },

    async init() {
      this.loading = true;
      this.error = null;
      try {
        const [mRes, aRes, uRes] = await Promise.all([
          apiFetch(`/api/v1/machines/${slug}`),
          apiFetch(`/api/v1/machines/${slug}/authorizations`),
          apiFetch(`/api/v1/machines/${slug}/users`),
        ]);

        if (mRes.status === 403) { this.error = 'Access denied.'; this.loading = false; return; }
        if (!mRes.ok) { this.error = 'Failed to load machine.'; this.loading = false; return; }

        this.machine = await mRes.json();
        this.editForm = { name: this.machine.name, slug: this.machine.slug, machine_type: this.machine.machine_type, active: this.machine.active };

        this.authorizations = aRes.ok ? await aRes.json() : [];
        this.authUsers = uRes.ok ? await uRes.json() : [];

        if (isAdmin) {
          const [adRes, allURes] = await Promise.all([
            apiFetch(`/api/v1/machines/${slug}/admins`),
            apiFetch('/api/v1/users'),
          ]);
          this.machineAdmins = adRes.ok ? await adRes.json() : [];
          this.allUsers = allURes.ok ? await allURes.json() : [];
        }
      } catch (e) {
        if (e !== 'unauthenticated') this.error = e.message || 'Failed to load.';
      } finally {
        this.loading = false;
      }
    },

    // ── Machine edit ──────────────────────────────────────────────────
    async saveMachine() {
      this.savingMachine = true;
      this.machineEditError = null;
      try {
        const r = await apiFetch(`/api/v1/machines/${this.slug}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(this.editForm),
        });
        const data = await r.json();
        if (!r.ok) { this.machineEditError = data.detail || 'Failed to save.'; return; }
        this.machine = data;
        if (data.slug !== this.slug) {
          this.slug = data.slug;
          history.replaceState(null, '', `/machines/${data.slug}`);
        }
        this.showEditMachine = false;
      } catch (e) {
        this.machineEditError = e.message;
      } finally {
        this.savingMachine = false;
      }
    },

    // ── Authorizations ────────────────────────────────────────────────
    startEditAuth(a) {
      this.editingAuth = a.user_id;
      this.authEditForm = {
        price_per_login: a.price_per_login,
        price_per_minute: a.price_per_minute,
        booking_interval: a.booking_interval,
      };
    },

    async saveAuth(userId) {
      this.authError = null;
      try {
        const r = await apiFetch(`/api/v1/machines/${this.slug}/authorizations/${userId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(this.authEditForm),
        });
        const data = await r.json();
        if (!r.ok) { this.authError = data.detail || 'Failed to update.'; return; }
        const idx = this.authorizations.findIndex(a => a.user_id === userId);
        if (idx !== -1) this.authorizations[idx] = { ...this.authorizations[idx], ...data };
        this.editingAuth = null;
      } catch (e) {
        this.authError = e.message;
      }
    },

    async removeAuth(userId) {
      this.authError = null;
      try {
        const r = await apiFetch(`/api/v1/machines/${this.slug}/authorizations/${userId}`, { method: 'DELETE' });
        if (!r.ok) { const d = await r.json(); this.authError = d.detail || 'Failed to remove.'; return; }
        this.authorizations = this.authorizations.filter(a => a.user_id !== userId);
      } catch (e) {
        this.authError = e.message;
      }
    },

    async addAuth() {
      this.addingAuth = true;
      this.addAuthError = null;
      try {
        const r = await apiFetch(`/api/v1/machines/${this.slug}/authorizations`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            nfc_id: parseInt(this.addAuthForm.nfc_id),
            price_per_login: this.addAuthForm.price_per_login,
            price_per_minute: this.addAuthForm.price_per_minute,
            booking_interval: parseInt(this.addAuthForm.booking_interval),
          }),
        });
        const data = await r.json();
        if (!r.ok) { this.addAuthError = data.detail || 'Failed to add.'; return; }
        const user = this.authUsers.find(u => String(u.id) === String(this.addAuthForm.nfc_id));
        this.authorizations.push({ ...data, user_name: user ? user.name : null });
        this.addAuthForm = { nfc_id: '', price_per_login: '0.00', price_per_minute: '0.00', booking_interval: 60 };
      } catch (e) {
        this.addAuthError = e.message;
      } finally {
        this.addingAuth = false;
      }
    },

    // ── Machine admins ────────────────────────────────────────────────
    async addAdmin() {
      this.addingAdmin = true;
      this.addAdminError = null;
      try {
        const r = await apiFetch(`/api/v1/machines/${this.slug}/admins`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ oidc_sub: this.addAdminForm.oidc_sub }),
        });
        const data = await r.json();
        if (!r.ok) { this.addAdminError = data.detail || 'Failed to add.'; return; }
        this.machineAdmins.push(data);
        this.addAdminForm = { oidc_sub: '' };
      } catch (e) {
        this.addAdminError = e.message;
      } finally {
        this.addingAdmin = false;
      }
    },

    async removeAdmin(oidcSub) {
      this.adminError = null;
      try {
        const r = await apiFetch(`/api/v1/machines/${this.slug}/admins/${encodeURIComponent(oidcSub)}`, { method: 'DELETE' });
        if (!r.ok) { const d = await r.json(); this.adminError = d.detail || 'Failed to remove.'; return; }
        this.machineAdmins = this.machineAdmins.filter(a => a.oidc_sub !== oidcSub);
      } catch (e) {
        this.adminError = e.message;
      }
    },
  }
}
</script>
{% endblock %}
